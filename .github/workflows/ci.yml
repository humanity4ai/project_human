name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type checks
        run: pnpm check

      - name: Build package
        run: pnpm --filter @humanity4ai/mcp-servers build

      - name: Eval baseline
        run: EVAL_REPORT=1 pnpm evals

      - name: Unit and integration tests (mcp-servers)
        run: pnpm --filter @humanity4ai/mcp-servers test:coverage

      - name: Unit tests (evals)
        run: pnpm --filter @humanity4ai/evals test:coverage

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/reports/latest.md
          if-no-files-found: ignore

      - name: Upload coverage (mcp-servers)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mcp-servers
          path: mcp-servers/coverage/lcov.info
          if-no-files-found: ignore

      - name: Upload coverage (evals)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-evals
          path: evals/coverage/lcov.info
          if-no-files-found: ignore
