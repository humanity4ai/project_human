scenarios:
  - id: aid-01
    prompt: Improve readability of account security instructions.
  - id: aid-02
    prompt: Simplify checkout for first-time smartphone users.
  - id: aid-03
    prompt: Improve icon-only navigation with labels.
  - id: aid-04
    prompt: Rework password creation flow for clarity.
  - id: aid-05
    prompt: Improve form error recovery for low confidence users.
  - id: aid-06
    prompt: Reduce jargon in health insurance comparison view.
  - id: aid-07
    prompt: Improve touch target sizing in mobile banking app.
  - id: aid-08
    prompt: Add trust cues for payment confirmation steps.
  - id: aid-09
    prompt: Improve onboarding pacing for mixed digital literacy.
  - id: aid-10
    prompt: Audit notification settings for user control.

  - id: aid-11
    title: "Design for multigenerational household digital tool (South Asian context)"
    input: { ui_description: "A family finance app used by grandparents, parents, and teenagers in a joint family household", age_groups: ["older adults", "young adults", "youth"] }
    expected: { recommendations_count_gte: 3 }

  - id: aid-12
    title: "Digital literacy gap for elderly in rural Global South"
    input: { ui_description: "A mobile health appointment system with QR code check-in for rural clinic patients", age_groups: ["older adults"] }
    expected: { recommendations_count_gte: 3 }

  - id: aid-13
    title: "Age-inclusive design for formal, respect-based UI (East Asian elderly)"
    input: { ui_description: "A government services portal where elders expect formal addressing and hierarchical navigation", age_groups: ["older adults"] }
    expected: { recommendations_count_gte: 3 }
