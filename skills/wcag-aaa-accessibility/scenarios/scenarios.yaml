scenarios:
  - id: wcag-01
    prompt: Audit a signup form with low contrast and missing labels.
  - id: wcag-02
    prompt: Check keyboard navigation for modal interactions.
  - id: wcag-03
    prompt: Evaluate heading structure on a dashboard page.
  - id: wcag-04
    prompt: Audit ARIA usage in tabs and accordions.
  - id: wcag-05
    prompt: Check link purpose and external link indicators.
  - id: wcag-06
    prompt: Evaluate error message accessibility in forms.
  - id: wcag-07
    prompt: Audit focus visibility on interactive controls.
  - id: wcag-08
    prompt: Evaluate table semantics in data-heavy views.
  - id: wcag-09
    prompt: Check skip links and landmark structure.
  - id: wcag-10
    prompt: Assess responsive layout for touch targets.

  - id: a11y-ambiguous-color
    title: "Ambiguous colour — cultural interpretation matters"
    input: { target: "<div style='color:red;background:white'>Error</div>", level: "AA" }
    expected: { findings_count: 5 }

  - id: a11y-tradeoff-animation
    title: "Tradeoff: animation helps dyslexia but harms motion sensitivity"
    input: { target: "<div class='animated-guide' aria-label='Step-by-step guide'>Content</div>", level: "AAA" }
    expected: { findings_count: 5 }

  - id: a11y-rtr-arabic
    title: "Right-to-left layout — Arabic support"
    input: { target: "<html dir='rtl' lang='ar'><body><div>محتوى</div></body></html>", level: "AA" }
    expected: { findings_count: 5 }

  - id: a11y-high-contrast-vs-readability
    title: "Tradeoff: high contrast helps low vision, may cause glare for some"
    input: { target: "<div style='color:#000;background:#fff'>Maximum contrast text</div>", level: "AAA" }
    expected: { findings_count: 5 }

  - id: a11y-captcha-accessibility
    title: "CAPTCHA creates barrier for multiple disability types"
    input: { target: "<form><img src='captcha.png' alt='CAPTCHA'><input type='text' name='captcha'></form>", level: "AA" }
    expected: { findings_count: 5 }
