scenarios:
  - id: cde-01
    prompt: Defuse argument in customer support ticket thread.
  - id: cde-02
    prompt: Reframe angry complaint email for calmer response.
  - id: cde-03
    prompt: Handle team conflict over ownership dispute.
  - id: cde-04
    prompt: Respond to hostile social media mention.
  - id: cde-05
    prompt: Calm user upset about account lockout.
  - id: cde-06
    prompt: Guide a manager through tense one-on-one meeting.
  - id: cde-07
    prompt: De-escalate billing disagreement in chat.
  - id: cde-08
    prompt: Defuse escalation between internal stakeholders.
  - id: cde-09
    prompt: Handle repeated interruptions in discussion.
  - id: cde-10
    prompt: Recommend handoff path for unresolved high-intensity conflict.

  - id: cd-11
    title: "Conflict in collectivist workplace with face-saving dynamics"
    input: { situation: "A team member publicly criticised the senior manager's decision", intensity: "high" }
    expected: { plan_steps_count: 7, risk_notes_count_gte: 3 }

  - id: cd-12
    title: "Family business dispute with generational hierarchy tensions"
    input: { situation: "Younger sibling wants to modernise the family restaurant against elder's wishes", intensity: "medium" }
    expected: { plan_steps_count: 7 }

  - id: cd-13
    title: "Cross-cultural customer complaint about perceived disrespect"
    input: { situation: "Customer from a high-context culture felt insulted by direct service refusal", intensity: "high" }
    expected: { risk_notes_count_gte: 3 }
