scenarios:
  - id: aa-html-basic
    description: Basic HTML with semantic markup
    input:
      target: "<html><head><title>Test</title></head><body><main><h1>Hello</h1><p>Content</p></main></body></html>"
      level: AA
    expected: aggregate_score >= 50
  
  - id: aa-html-complex
    description: Complex HTML with inline styles and missing landmarks
    input:
      target: "<div><span style='color:#999'>Hard to read</span><div style='background-color:#fff'><a href='#'>Link</a></div></div>"
      level: AA
    expected: aggregate_score < 70

  - id: aa-description-heuristic
    description: UI description (not HTML) should trigger heuristic mode
    input:
      target: "A login form with a submit button and username/password fields"
      level: AA
    expected: heuristic == true

  - id: aa-aaa-comparison
    description: AAA mode should be stricter than AA
    input:
      target: "<div><span style='color:#888'>text</span></div>"
      level: AAA
    expected: aggregate_score is defined
  
  - id: aa-empty
    description: Empty input defaults to heuristic analysis
    input:
      target: ""
      level: AA
    expected: heuristic == true
  
  - id: aa-semantic-good
    description: Well-structured HTML should score high
    input:
      target: "<!DOCTYPE html><html lang='en'><head><title>Good</title></head><body><a href='#main' class='skip-link'>Skip</a><header role='banner'><nav><ul><li><a href='/'>Home</a></li></ul></nav></header><main id='main'><section aria-label='Intro'><h1>Title</h1><h2>Sub</h2><p>Content</p></section></main><footer role='contentinfo'><p>Footer</p></footer></body></html>"
      level: AA
    expected: aggregate_score >= 70
  
  - id: aa-french
    description: Localized output for French locale
    input:
      target: "<div><h1>Titre</h1></div>"
      level: AA
      locale: fr
    expected: aggregate_score is defined
  
  - id: aa-japanese
    description: Japanese locale test
    input:
      target: "<div><h1>タイトル</h1><p>コンテンツ</p></div>"
      level: AA
      locale: ja
    expected: aggregate_score is defined
  
  - id: aa-no-headings
    description: HTML without headings should score low
    input:
      target: "<div><div>Section 1</div><div>Section 2</div></div>"
      level: AA
    expected: aggregate_score < 60
  
  - id: aa-inline-styles
    description: Inline styles should flag color contrast issues
    input:
      target: "<div style='color:#ccc;background-color:#fff'>Low contrast text</div>"
      level: AA
    expected: aggregate_score < 80
