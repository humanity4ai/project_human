#
# Usage:
#   docker compose up --build          Start server
#   docker compose up --build -d       Start in background
#   docker compose down                Stop and remove containers
#
# Send a request to the running server:
#   echo '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' | docker compose exec -T mcp-server node dist/mcp-server.js

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: humanity4ai-mcp:latest
    container_name: humanity4ai-mcp-server
    restart: unless-stopped
    stdin_open: true
    tty: false
    environment:
      - NODE_ENV=production
    volumes: []
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
